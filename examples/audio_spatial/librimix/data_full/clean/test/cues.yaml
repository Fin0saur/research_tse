cues:
  audio:
    type: raw
    guaranteed: true
    scope: speaker
    policy:
      type: fixed
      key: mix_spk_id
      resource: data_full/clean/test/cues/fixed_enroll.json
  spatial:
    type: npy
    guaranteed: true
    scope: speaker
    policy:
      type: fixed
      key: mix_spk_id
      resource: data_full/clean/test/cues/spatial.json
    spatial_fields: ["azimuth","elevation"]  
